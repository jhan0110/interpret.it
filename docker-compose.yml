services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: interpretit
      POSTGRES_PASSWORD: interpretit
      POSTGRES_DB: interpretit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interpretit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ./services/gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: postgresql+asyncpg://interpretit:interpretit@postgres:5432/interpretit
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      # In production this must be the public origin Caddy serves on
      # (e.g. https://interpretit.duckdns.org). The gateway uses it to
      # sign URLs the browser will fetch; if it points at localhost, the
      # browser fetches its own machine and audio silently 404s.
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: interpretit
      INTERNAL_RPC_SECRET: ${INTERNAL_RPC_SECRET}
    volumes:
      - ./services/gateway/app:/app/app:ro
      - ./services/gateway/alembic:/app/alembic:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  analysis:
    build:
      context: ./services/analysis
    image: phase5-analysis:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8001)); s.close()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: interpretit
      GATEWAY_RPC_URL: http://gateway:8000
      INTERNAL_RPC_SECRET: ${INTERNAL_RPC_SECRET}
      MAX_DAILY_USD: ${MAX_DAILY_USD:-5}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-anthropic/claude-sonnet-4-6}
      TTS_PROVIDER: ${TTS_PROVIDER:-openai}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-openai/gpt-audio}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_FEEDBACK_VOICE: ${ELEVENLABS_FEEDBACK_VOICE:-EXAVITQu4vr4xnSDxMaL}
      USE_MOCKS: ${USE_MOCKS:-1}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      WHISPER_PROVIDER: ${WHISPER_PROVIDER:-local}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3}
    volumes:
      - ./services/analysis/app:/app/app:ro
    depends_on:
      - redis
      - minio
      - gateway

  arq-semantic:
    image: phase5-analysis:latest
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"redis\", 6379)); s.close()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: interpretit
      GATEWAY_RPC_URL: http://gateway:8000
      ARQ_QUEUE_NAME: semantic
      INTERNAL_RPC_SECRET: ${INTERNAL_RPC_SECRET}
      MAX_DAILY_USD: ${MAX_DAILY_USD:-5}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-anthropic/claude-sonnet-4-6}
      TTS_PROVIDER: ${TTS_PROVIDER:-openai}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-openai/gpt-audio}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_FEEDBACK_VOICE: ${ELEVENLABS_FEEDBACK_VOICE:-EXAVITQu4vr4xnSDxMaL}
      USE_MOCKS: ${USE_MOCKS:-1}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      WHISPER_PROVIDER: ${WHISPER_PROVIDER:-local}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3}
    volumes:
      - ./services/analysis/app:/app/app:ro
    depends_on:
      - redis
      - minio
      - gateway

  arq-generation:
    image: phase5-analysis:latest
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"redis\", 6379)); s.close()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: interpretit
      GATEWAY_RPC_URL: http://gateway:8000
      ARQ_QUEUE_NAME: generation
      INTERNAL_RPC_SECRET: ${INTERNAL_RPC_SECRET}
      MAX_DAILY_USD: ${MAX_DAILY_USD:-5}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-anthropic/claude-sonnet-4-6}
      TTS_PROVIDER: ${TTS_PROVIDER:-openai}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-openai/gpt-audio}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_FEEDBACK_VOICE: ${ELEVENLABS_FEEDBACK_VOICE:-EXAVITQu4vr4xnSDxMaL}
      USE_MOCKS: ${USE_MOCKS:-1}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      WHISPER_PROVIDER: ${WHISPER_PROVIDER:-local}
      GROQ_WHISPER_MODEL: ${GROQ_WHISPER_MODEL:-whisper-large-v3}
    volumes:
      - ./services/analysis/app:/app/app:ro
    depends_on:
      - redis
      - minio
      - gateway

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      GATEWAY_URL: http://gateway:8000
    depends_on:
      - gateway

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-interpretit.local}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_PASSWORD_HASH: ${BASIC_AUTH_PASSWORD_HASH}
    depends_on:
      - gateway
      - frontend

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
